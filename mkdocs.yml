site_name: "Chain of Knowledge: System Design Notes"
site_description: "A structured, first-principles guide to mastering system design, distributed systems, and software architecture for engineers."
site_url: "https://alshamali-knowledge.github.io/system-design-mastery/"

repo_name: alshamali-knowledge/system-design-mastery
repo_url: "https://github.com/alshamali-knowledge/system-design-mastery"
edit_uri: edit/main/docs/

theme:
  name: material
  favicon: assets/favicon.png  
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      color:
        footer-fg: '#949494'
        footer-fg--lighter: '#e0e0e0'
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      color:
        footer-fg: '#b0b0b0'
        footer-fg--lighter: '#f5f5f5'
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

  analytics:
    provider: google
    property: G-69FMV7V3KQ
  
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/alshamali-knowledge"
      name: GitHub Repository

copyright: "Copyright &copy; 2026 Chain of Knowledge. Built for engineers, by engineers."

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_javascript:
  - javascripts/accessibility.js
  - javascripts/mathjax.js
  - javascripts/reading-bookmark.js
  - javascripts/reading-progress.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks.py

plugins:
  - search
  - awesome-pages
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true