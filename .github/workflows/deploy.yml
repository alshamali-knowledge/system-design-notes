name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          # FIX: Use a stable key based on OS and Python version, NOT the commit SHA.
          # Using github.sha means the cache is missed on every single commit, defeating the purpose.
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-
          
      - name: Install MkDocs Material & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-minify-plugin beautifulsoup4
        
      - name: Build and Deploy to gh-pages branch
        run: mkdocs gh-deploy --force